spring.application.name=BatimenTIGER
server.port=8090

# --- Base de données ---
spring.datasource.url=jdbc:postgresql://localhost:5432/TIGER
spring.datasource.username=postgres
spring.datasource.password=user
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- OPTIMISATION : Gestion des fichiers volumineux ---
# Si vous avez plusieurs photos, 50MB au total peut être atteint rapidement.
# Nous passons à 100MB pour être large, surtout si vous uploadez plusieurs plans ou photos haute résolution.
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# --- OPTIMISATION : Taille du cache mémoire ---
# Hibernate peut être gourmand lors de la conversion binaire.
# Si vous recevez des erreurs "Out of Memory", augmentez ceci (optionnel).
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Logs ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE